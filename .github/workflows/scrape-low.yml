name: Scrape Low Urgency Reviews

on:
  schedule:
    # Runs every 6 hours. Adjust as needed (e.g. '0 */6 * * *')
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GH UI

jobs:
  scrape-low:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      # Puppeteer dependencies required in GH Actions ubuntu runners
      - name: Install Puppeteer Dependencies
        run: npx puppeteer browsers install chrome

      - name: Run Low Urgency Scraper
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node run_scraper.js LOW
