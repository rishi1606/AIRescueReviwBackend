name:Scraper View

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Install Chrome
        run: npx puppeteer browsers install chrome --path=/tmp/chrome

      - name: Run Unified Review Scraper
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node run_scraper.js